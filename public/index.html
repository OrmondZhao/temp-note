<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app-title">临时笔记</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" />
    <link rel="stylesheet" href="style.css?v=1.1" />
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e7794f6ce6e2448ba9fdf596437bafb1"}'></script>
  </head>
  <body>
    <main class="app">
      <aside class="panel left">
        <section class="hero">
          <div class="brand">
            <h1 data-i18n="app-title">临时笔记</h1>
            <span class="badge">Prototype</span>
          </div>
          <p data-i18n="app-tagline">把工作中来得快、用得快的文本和图片，统一放进一个随时可打开的桌面级网页里。</p>
        </section>

        <section class="quick-stats" aria-label="统计">
          <div class="stat">
            <span class="value" id="stat-total">0</span>
            <span class="label" data-i18n="stat-total">素材总数</span>
          </div>
          <div class="stat">
            <span class="value" id="stat-pinned">0</span>
            <span class="label" data-i18n="stat-pinned">已置顶</span>
          </div>
          <div class="stat">
            <span class="value" id="stat-images">0</span>
            <span class="label" data-i18n="stat-images">图片素材</span>
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="section-workbench">工作台</h2>
          <div class="tool-row">
            <button class="primary-btn" id="new-note" type="button" data-i18n="btn-new-note">新建空白</button>
            <button class="ghost-btn" id="copy-current" type="button" data-i18n="btn-copy-current">复制内容</button>
          </div>
          <div class="tool-row" style="margin-top: 10px;">
            <button class="ghost-btn" id="export-btn" type="button" data-i18n="btn-export">导出</button>
            <button class="ghost-btn" id="import-btn" type="button" data-i18n="btn-import">导入</button>
            <input id="import-file" class="hidden" type="file" accept="application/json" />
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="section-tags">标签</h2>
          <div class="tag-cloud" id="tag-cloud"></div>
        </section>

        <section class="section">
          <h2 data-i18n="section-description">说明</h2>
          <div class="inspector-block" data-i18n="description-text">左侧只放全局操作和标签，真正的标题、正文和图片编辑都在中间主区域完成。</div>
        </section>
      </aside>

      <section class="panel workspace">
        <div class="workspace-top">
          <div class="workspace-copy">
            <div class="eyebrow" id="detail-kind" data-i18n="eyebrow-editor">编辑区</div>
          </div>
          <div class="toolbar">
            <button class="ghost-btn" id="lang-toggle" type="button" title="切换语言 / Switch Language" data-i18n="lang-switch">EN / 中文</button>
            <button class="ghost-btn" id="save-note" type="button" data-i18n="btn-save">保存</button>
            <button class="ghost-btn" id="toggle-pin" type="button" data-i18n="btn-pin">置顶</button>
            <button class="ghost-btn" id="toggle-favorite" type="button" data-i18n="btn-favorite">收藏</button>
            <button class="ghost-btn" id="toggle-theme" type="button" data-i18n="btn-theme-dark">暗黑模式</button>
          </div>
        </div>

        <div class="editor-shell">
          <div class="editor-grid">
            <div class="detail-field">
              <label for="detail-title" data-i18n="label-title">标题</label>
              <input id="detail-title" type="text" data-i18n-placeholder="placeholder-title" placeholder="输入标题，或留空后再补充。" />
            </div>
            <div class="detail-field">
              <label for="detail-body" data-i18n="label-body">正文 / 备注</label>
              <div id="detail-body"></div>
            </div>
            <div class="detail-field">
              <label for="detail-tags" data-i18n="label-tags">标签</label>
              <input id="detail-tags" type="text" data-i18n-placeholder="placeholder-tags" placeholder="用逗号分隔，例如：工作,接口,待确认" />
            </div>
            <div class="attachments-block">
              <div class="attachments-head">
                <div class="attachments-left">
                  <div class="dropzone-mini" id="editor-dropzone" data-i18n-title="dropzone-hint" title="拖拽图片到这里"><span class="dz-hint" data-i18n="dropzone-hint">拖图</span><img class="dz-preview" alt="" /></div>
                  <span class="muted" data-i18n="label-attachments">截图附件</span>
                </div>
                <span class="muted" id="attachment-count">0 张</span>
              </div>
              <div id="detail-attachments" class="attachments-grid"></div>
            </div>
            <div class="detail-actions">
              <button class="mini-btn" id="copy-summary" type="button" data-i18n="btn-copy-summary">复制摘要</button>
              <button class="mini-btn" id="move-up" type="button" data-i18n="btn-move-up">上移</button>
              <button class="mini-btn" id="move-down" type="button" data-i18n="btn-move-down">下移</button>
              <button class="mini-btn" id="delete-note" type="button" style="color: var(--danger);" data-i18n="btn-delete">删除</button>
            </div>
            <p class="muted" id="detail-meta" data-i18n="meta-no-note">点击右侧卡片可切换到编辑模式，或在左侧新建一条内容。</p>
          </div>
        </div>
      </section>

      <aside class="panel right">
        <section class="inspector">
          <div class="inspector-head">
            <h2 data-i18n="panel-search">快速查找</h2>
            <span class="muted" id="result-count">0</span>
          </div>

          <div class="searchbar">
            <span>&#128269;</span>
            <input id="search" type="search" data-i18n-placeholder="placeholder-search" placeholder="搜索标题、正文、标签" />
          </div>

          <select id="sort" class="select">
            <option value="updated-desc" data-i18n="sort-updated-desc">最近更新</option>
            <option value="created-desc" data-i18n="sort-created-desc">最近创建</option>
            <option value="created-asc" data-i18n="sort-created-asc">最早创建</option>
            <option value="manual" data-i18n="sort-manual">手动顺序</option>
          </select>

          <div class="tool-row">
            <button class="mini-btn active" data-filter="all" type="button" data-i18n="filter-all">全部</button>
            <button class="mini-btn" data-filter="text" type="button" data-i18n="filter-text">文本</button>
            <button class="mini-btn" data-filter="image" type="button" data-i18n="filter-image">图片</button>
            <button class="mini-btn" data-filter="pinned" type="button" data-i18n="filter-pinned">置顶</button>
            <button class="mini-btn" data-filter="favorite" type="button" data-i18n="filter-favorite">收藏</button>
          </div>

          <div class="finder-content" id="content">
            <div class="grid" id="grid"></div>
            <div class="empty hidden" id="empty-state">
              <div>
                <h3 data-i18n="empty-title">这里还没有素材</h3>
                <p data-i18n="empty-hint">试着在中间编辑区写点内容，或者直接粘贴一张截图。</p>
              </div>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <div class="toast" id="toast"></div>
    <div class="image-modal hidden" id="image-modal" aria-hidden="true">
      <div class="image-modal-content">
        <div class="image-modal-bar">
          <div id="image-modal-title" data-i18n="toast-image-preview">图片预览</div>
          <div class="image-modal-actions">
            <button class="image-modal-copy" id="image-modal-copy" type="button" data-i18n="btn-copy-summary">复制摘要</button>
            <button class="image-modal-close" id="image-modal-close" type="button" data-i18n="btn-close">关闭</button>
          </div>
        </div>
        <div class="image-modal-viewport">
          <img id="image-modal-img" alt="原图预览" />
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script src="app.js?v=1.2"></script>
  </body>
</html>
