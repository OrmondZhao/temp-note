<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>临时素材板</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" />
    <link rel="stylesheet" href="style.css?v=1.0" />
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e7794f6ce6e2448ba9fdf596437bafb1"}'></script>
  </head>
  <body>
    <main class="app">
      <aside class="panel left">
        <section class="hero">
          <div class="brand">
            <h1>临时素材板</h1>
            <span class="badge">Prototype</span>
          </div>
          <p>把工作中来得快、用得快的文本和图片，统一放进一个随时可打开的桌面级网页里。</p>
        </section>

        <section class="quick-stats" aria-label="统计">
          <div class="stat">
            <span class="value" id="stat-total">0</span>
            <span class="label">素材总数</span>
          </div>
          <div class="stat">
            <span class="value" id="stat-pinned">0</span>
            <span class="label">已置顶</span>
          </div>
          <div class="stat">
            <span class="value" id="stat-images">0</span>
            <span class="label">图片素材</span>
          </div>
        </section>

        <section class="section">
          <h2>工作台</h2>
          <div class="tool-row">
            <button class="primary-btn" id="new-note" type="button">新建空白</button>
            <button class="ghost-btn" id="copy-current" type="button">复制内容</button>
          </div>
          <div class="tool-row" style="margin-top: 10px;">
            <button class="ghost-btn" id="export-btn" type="button">导出</button>
            <button class="ghost-btn" id="import-btn" type="button">导入</button>
            <input id="import-file" class="hidden" type="file" accept="application/json" />
          </div>
        </section>

        <section class="section">
          <h2>标签</h2>
          <div class="tag-cloud" id="tag-cloud"></div>
        </section>

        <section class="section">
          <h2>说明</h2>
          <div class="inspector-block">
            左侧只放全局操作和标签，真正的标题、正文和图片编辑都在中间主区域完成。
          </div>
        </section>
      </aside>

      <section class="panel workspace">
        <div class="workspace-top">
          <div class="workspace-copy">
            <div class="eyebrow" id="detail-kind">编辑区</div>
          </div>
          <div class="toolbar">
            <button class="ghost-btn" id="save-note" type="button">保存</button>
            <button class="ghost-btn" id="toggle-pin" type="button">置顶</button>
            <button class="ghost-btn" id="toggle-favorite" type="button">收藏</button>
            <button class="ghost-btn" id="toggle-theme" type="button">暗黑模式</button>
          </div>
        </div>

        <div class="editor-shell">
          <div class="editor-grid">
            <div class="detail-field">
              <label for="detail-title">标题</label>
              <input id="detail-title" type="text" placeholder="输入标题，或留空后再补充。" />
            </div>
            <div class="detail-field">
              <label for="detail-body">正文 / 备注</label>
              <div id="detail-body"></div>
            </div>
            <div class="detail-field">
              <label for="detail-tags">标签</label>
              <input id="detail-tags" type="text" placeholder="用逗号分隔，例如：工作,接口,待确认" />
            </div>
            <div class="attachments-block">
              <div class="attachments-head">
                <div class="attachments-left">
                  <div class="dropzone-mini" id="editor-dropzone" title="拖拽图片到这里">
                    拖图
                  </div>
                  <span class="muted">截图附件</span>
                </div>
                <span class="muted" id="attachment-count">0 张</span>
              </div>
              <div id="detail-attachments" class="attachments-grid"></div>
            </div>
            <div class="detail-actions">
              <button class="mini-btn" id="copy-summary" type="button">复制摘要</button>
              <button class="mini-btn" id="move-up" type="button">上移</button>
              <button class="mini-btn" id="move-down" type="button">下移</button>
              <button class="mini-btn" id="delete-note" type="button" style="color: var(--danger);">删除</button>
            </div>
            <p class="muted" id="detail-meta"></p>
          </div>
        </div>
      </section>

      <aside class="panel right">
        <section class="inspector">
          <div class="inspector-head">
            <h2>快速查找</h2>
            <span class="muted" id="result-count">0</span>
          </div>

          <div class="searchbar">
            <span>🔍</span>
            <input id="search" type="search" placeholder="搜索标题、正文、标签" />
          </div>

          <select id="sort" class="select">
            <option value="updated-desc">最近更新</option>
            <option value="created-desc">最近创建</option>
            <option value="created-asc">最早创建</option>
            <option value="manual">手动顺序</option>
          </select>

          <div class="tool-row">
            <button class="mini-btn active" data-filter="all" type="button">全部</button>
            <button class="mini-btn" data-filter="text" type="button">文本</button>
            <button class="mini-btn" data-filter="image" type="button">图片</button>
            <button class="mini-btn" data-filter="pinned" type="button">置顶</button>
            <button class="mini-btn" data-filter="favorite" type="button">收藏</button>
          </div>

          <div class="finder-content" id="content">
            <div class="grid" id="grid"></div>
            <div class="empty hidden" id="empty-state">
              <div>
                <h3>这里还没有素材</h3>
                <p>试着在中间编辑区写点内容，或者直接粘贴一张截图。</p>
              </div>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <div class="toast" id="toast"></div>
    <div class="image-modal hidden" id="image-modal" aria-hidden="true">
      <div class="image-modal-content">
        <div class="image-modal-bar">
          <div id="image-modal-title">图片预览</div>
          <div class="image-modal-actions">
            <button class="image-modal-copy" id="image-modal-copy" type="button">复制</button>
            <button class="image-modal-close" id="image-modal-close" type="button">关闭</button>
          </div>
        </div>
        <div class="image-modal-viewport">
          <img id="image-modal-img" alt="原图预览" />
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script src="app.js?v=1.0"></script>
  </body>
</html>
