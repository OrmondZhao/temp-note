<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>涓存椂绱犳潗鏉</title>
    <style>
      :root {
        --bg: #f4efe7;
        --bg-2: #e9e2d3;
        --surface: rgba(255, 255, 255, 0.78);
        --surface-strong: #fffdf8;
        --text: #1f1a17;
        --muted: #766a5f;
        --accent: #c96b3f;
        --accent-2: #2d7c73;
        --danger: #c84b4b;
        --shadow: 0 18px 40px rgba(50, 36, 25, 0.12);
        --radius-lg: 28px;
        --radius-md: 20px;
        --radius-sm: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Aptos", "Segoe UI", "Noto Sans SC", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(240, 179, 79, 0.25), transparent 30%),
          radial-gradient(circle at top right, rgba(45, 124, 115, 0.18), transparent 28%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
        background-size: 46px 46px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.35), transparent 80%);
        opacity: 0.35;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 360px;
        gap: 18px;
        padding: 18px;
      }

      .panel {
        background: var(--surface);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.55);
        box-shadow: var(--shadow);
        border-radius: var(--radius-lg);
        overflow: hidden;
        min-height: 0;
      }

      .left,
      .workspace,
      .right {
        display: flex;
        flex-direction: column;
      }

      .hero {
        padding: 22px;
        color: #fff7ef;
        background:
          linear-gradient(135deg, rgba(38, 32, 28, 0.94), rgba(56, 46, 37, 0.9)),
          radial-gradient(circle at top right, rgba(240, 179, 79, 0.3), transparent 32%);
        position: relative;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -36px -62px auto;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(240, 179, 79, 0.36), transparent 68%);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.08em;
        font-weight: 800;
      }

      .badge {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: #f8e8d8;
        font-size: 12px;
      }

      .hero p {
        margin: 14px 0 0;
        max-width: 24ch;
        color: rgba(255, 247, 239, 0.82);
        line-height: 1.6;
      }

      .quick-stats {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px 18px 18px;
      }

      .stat {
        padding: 12px;
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(54, 38, 28, 0.08);
      }

      .stat .value {
        display: block;
        font-size: 22px;
        font-weight: 800;
      }

      .stat .label {
        display: block;
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .section {
        padding: 0 18px 18px;
      }

      .section h2 {
        margin: 0 0 12px;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .tool-row,
      .searchbar,
      .tag-cloud,
      .inspector-block,
      .dropzone {
        border: 1px solid rgba(56, 40, 27, 0.08);
        background: rgba(255, 255, 255, 0.72);
        border-radius: var(--radius-sm);
      }

      .tool-row {
        display: flex;
        gap: 10px;
        padding: 10px;
        flex-wrap: wrap;
      }

      .primary-btn,
      .ghost-btn,
      .mini-btn {
        border: 0;
        border-radius: 999px;
        transition:
          transform 0.16s ease,
          background 0.16s ease,
          color 0.16s ease,
          box-shadow 0.16s ease;
      }

      .primary-btn,
      .ghost-btn {
        padding: 11px 14px;
        font-weight: 700;
      }

      .mini-btn {
        padding: 8px 12px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.84);
        color: var(--text);
        border: 1px solid rgba(56, 40, 27, 0.08);
      }

      .primary-btn {
        background: linear-gradient(135deg, var(--accent), #da8a63);
        color: #fff;
        box-shadow: 0 10px 18px rgba(201, 107, 63, 0.22);
      }

      .ghost-btn {
        background: rgba(255, 255, 255, 0.84);
        color: var(--text);
        border: 1px solid rgba(56, 40, 27, 0.08);
      }

      .primary-btn:hover,
      .ghost-btn:hover,
      .mini-btn:hover,
      .chip:hover,
      .card:hover {
        transform: translateY(-1px);
      }

      .tag-cloud {
        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--muted);
        border: 1px solid rgba(56, 40, 27, 0.08);
        transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
      }

      .chip.active {
        background: rgba(201, 107, 63, 0.12);
        color: var(--accent);
        border-color: rgba(201, 107, 63, 0.22);
      }

      .inspector-block {
        padding: 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      .workspace {
        gap: 14px;
        min-width: 0;
      }

      .workspace-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 18px 0;
      }

      .workspace-copy {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        flex: 1;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(45, 124, 115, 0.12);
        color: var(--accent-2);
        font-size: 12px;
        font-weight: 700;
        flex: 0 0 auto;
      }

      .workspace-title {
        font-size: 20px;
        font-weight: 800;
        white-space: nowrap;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
      }

      .statusline {
        padding: 0;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        margin-left: auto;
      }

      .statusline strong {
        color: var(--text);
      }

      .editor-shell {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 0 18px 18px;
      }

      .editor-grid {
        display: grid;
        gap: 12px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(56, 40, 27, 0.08);
        border-radius: var(--radius-lg);
        padding: 16px;
      }

      .detail-field {
        display: grid;
        gap: 6px;
      }

      .detail-field label {
        font-size: 12px;
        color: var(--muted);
      }

      .detail-field input,
      .detail-field textarea {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(56, 40, 27, 0.08);
        background: rgba(255, 255, 255, 0.9);
        padding: 10px 12px;
        outline: 0;
        color: var(--text);
      }

      .detail-field textarea {
        min-height: 360px;
        height: 48vh;
        resize: vertical;
        line-height: 1.65;
      }

      .dropzone {
        padding: 14px;
        color: var(--muted);
        line-height: 1.6;
        border-style: dashed;
        background:
          linear-gradient(135deg, rgba(45, 124, 115, 0.12), rgba(240, 179, 79, 0.12)),
          rgba(255, 255, 255, 0.8);
      }

      .attachments-block {
        display: grid;
        gap: 10px;
        padding: 14px;
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(56, 40, 27, 0.08);
      }

      .attachments-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .attachments-left {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .dropzone-mini {
        width: 48px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        border: 1px dashed rgba(45, 124, 115, 0.45);
        background: rgba(45, 124, 115, 0.1);
        color: var(--accent-2);
        font-size: 12px;
        font-weight: 700;
        user-select: none;
      }

      .attachments-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 10px;
      }

      .attachment-card {
        margin: 0;
        display: grid;
        gap: 8px;
        padding: 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(56, 40, 27, 0.08);
      }

      .attachment-card img {
        width: 100%;
        max-height: 180px;
        object-fit: contain;
        border-radius: 12px;
        background: #f7f2e8;
      }

      .attachment-card figcaption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .detail-image {
        width: 100%;
        max-height: 70vh;
        object-fit: contain;
        border-radius: 16px;
        background: #f7f2e8;
      }

      .image-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(18, 15, 12, 0.72);
        z-index: 30;
      }

      .image-modal.hidden {
        display: none;
      }

      .image-modal-content {
        position: relative;
        width: min(1100px, 96vw);
        max-height: 92vh;
        display: grid;
        gap: 12px;
      }

      .image-modal-viewport {
        max-height: 86vh;
        overflow: auto;
        border-radius: 20px;
        background: #111;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .image-modal-viewport img {
        display: block;
        width: auto;
        height: auto;
        max-width: none;
        max-height: none;
        border-radius: 0;
        margin: auto;
      }

      .image-modal-bar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        color: #fff;
      }

      .image-modal-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .image-modal-close {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }

      .image-modal-copy {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(45, 124, 115, 0.95);
        color: #fff;
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --bg: #111413;
        --bg-2: #171c1b;
        --surface: rgba(22, 26, 25, 0.82);
        --surface-strong: #1a1f1e;
        --text: #f3efe7;
        --muted: #b4aba0;
        --accent: #f09b6d;
        --accent-2: #7fd0c3;
        --danger: #f06b6b;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      }

      body[data-theme="dark"]::before {
        opacity: 0.12;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.2), transparent 80%);
      }

      body[data-theme="dark"] .stat,
      body[data-theme="dark"] .tool-row,
      body[data-theme="dark"] .searchbar,
      body[data-theme="dark"] .tag-cloud,
      body[data-theme="dark"] .inspector-block,
      body[data-theme="dark"] .dropzone,
      body[data-theme="dark"] .editor-grid,
      body[data-theme="dark"] .attachments-block,
      body[data-theme="dark"] .attachment-card,
      body[data-theme="dark"] .mini-btn,
      body[data-theme="dark"] .ghost-btn,
      body[data-theme="dark"] .select,
      body[data-theme="dark"] .card,
      body[data-theme="dark"] .empty,
      body[data-theme="dark"] .detail-field input,
      body[data-theme="dark"] .detail-field textarea,
      body[data-theme="dark"] .image-modal-close,
      body[data-theme="dark"] .image-modal-copy {
        background: rgba(25, 29, 28, 0.92);
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.08);
      }

      body[data-theme="dark"] .mini-btn,
      body[data-theme="dark"] .ghost-btn,
      body[data-theme="dark"] .select,
      body[data-theme="dark"] .detail-field input,
      body[data-theme="dark"] .detail-field textarea {
        background: rgba(255, 255, 255, 0.05);
      }

      body[data-theme="dark"] .hero {
        background:
          linear-gradient(135deg, rgba(8, 9, 9, 0.96), rgba(25, 29, 28, 0.96)),
          radial-gradient(circle at top right, rgba(240, 155, 109, 0.18), transparent 32%);
      }

      body[data-theme="dark"] .badge {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.1);
        color: #f5e8da;
      }

      body[data-theme="dark"] .dropzone {
        background:
          linear-gradient(135deg, rgba(127, 208, 195, 0.12), rgba(240, 155, 109, 0.08)),
          rgba(255, 255, 255, 0.04);
      }

      body[data-theme="dark"] .primary-btn {
        box-shadow: 0 10px 18px rgba(240, 155, 109, 0.18);
      }

      .detail-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .muted {
        color: var(--muted);
      }

      .right {
        padding: 18px;
        gap: 14px;
        min-width: 0;
      }

      .inspector {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
      }

      .inspector-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .inspector-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .searchbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
      }

      .searchbar input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
      }

      .select {
        width: 100%;
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(56, 40, 27, 0.08);
        background: rgba(255, 255, 255, 0.84);
        color: var(--text);
      }

      .finder-content {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }

      .grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        background: var(--surface-strong);
        border: 1px solid rgba(56, 40, 27, 0.08);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(46, 34, 24, 0.08);
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        animation: rise 0.32s ease;
      }

      .card.selected {
        border-color: rgba(201, 107, 63, 0.46);
        box-shadow: 0 0 0 2px rgba(201, 107, 63, 0.18), 0 18px 32px rgba(46, 34, 24, 0.12);
      }

      .card-body {
        padding: 14px;
        display: grid;
        gap: 8px;
      }

      .meta-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .card-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.35;
      }

      .card-text {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .badge-pill {
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(45, 124, 115, 0.1);
        color: var(--accent-2);
        font-size: 11px;
      }

      .empty {
        min-height: 260px;
        display: grid;
        place-items: center;
        text-align: center;
        border: 1px dashed rgba(56, 40, 27, 0.12);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.55);
        color: var(--muted);
        padding: 30px;
      }

      .empty h3 {
        margin: 0 0 8px;
        color: var(--text);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%) translateY(16px);
        background: rgba(34, 28, 23, 0.94);
        color: #fff;
        padding: 12px 16px;
        border-radius: 999px;
        box-shadow: 0 18px 32px rgba(0, 0, 0, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease, transform 0.22s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .hidden {
        display: none !important;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1280px) {
        body {
          overflow: auto;
        }

        .app {
          grid-template-columns: 280px minmax(0, 1fr);
          height: auto;
          min-height: 100%;
        }

        .right {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 920px) {
        .app {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .workspace-top {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .workspace-title {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="panel left">
        <section class="hero">
          <div class="brand">
            <h1>涓存椂绱犳潗鏉</h1>
            <span class="badge">Prototype</span>
          </div>
          <p>鎶婂伐浣滀腑鏉ュ緱蹇€佺敤寰楀揩鐨勬枃鏈拰鍥剧墖锛岀粺涓€鏀捐繘涓€涓殢鏃跺彲鎵撳紑鐨勬闈㈢骇缃戦〉閲屻€</p>
        </section>

        <section class="quick-stats" aria-label="缁熻">
          <div class="stat">
            <span class="value" id="stat-total">0</span>
            <span class="label">绱犳潗鎬绘暟</span>
          </div>
          <div class="stat">
            <span class="value" id="stat-pinned">0</span>
            <span class="label">宸茬疆椤</span>
          </div>
          <div class="stat">
            <span class="value" id="stat-images">0</span>
            <span class="label">鍥剧墖绱犳潗</span>
          </div>
        </section>

        <section class="section">
          <h2>宸ヤ綔鍙</h2>
          <div class="tool-row">
            <button class="primary-btn" id="new-note" type="button">鏂板缓绌虹櫧</button>
            <button class="ghost-btn" id="save-current" type="button">淇濆瓨褰撳墠</button>
            <button class="ghost-btn" id="copy-current" type="button">澶嶅埗鍐呭</button>
          </div>
          <div class="tool-row" style="margin-top: 10px;">
            <button class="ghost-btn" id="export-btn" type="button">瀵煎嚭</button>
            <button class="ghost-btn" id="import-btn" type="button">瀵煎叆</button>
            <input id="import-file" class="hidden" type="file" accept="application/json" />
          </div>
        </section>

        <section class="section">
          <h2>鏍囩</h2>
          <div class="tag-cloud" id="tag-cloud"></div>
        </section>

        <section class="section">
          <h2>璇存槑</h2>
          <div class="inspector-block">
            宸︿晶鍙斁鍏ㄥ眬鎿嶄綔鍜屾爣绛撅紝涓嶅啀閲嶅缂栬緫锛涚湡姝ｇ殑鏍囬銆佹鏂囧拰鍥剧墖缂栬緫閮藉湪涓棿涓诲尯瀹屾垚銆?          </div>
        </section>
      </aside>

      <section class="panel workspace">
        <div class="workspace-top">
          <div class="workspace-copy">
            <div class="eyebrow" id="detail-kind">缂栬緫鍖</div>
            <div class="workspace-title" id="editor-title">涓荤紪杈戝尯</div>

    <script>
      const DB_NAME = "temp-material-board";
      const DB_VERSION = 1;
      const STORE_NAME = "state";
      const STATE_KEY = "workspace";
      const UI_KEY = "workspace-ui";

      const els = {
        statTotal: document.getElementById("stat-total"),
        statPinned: document.getElementById("stat-pinned"),
        statImages: document.getElementById("stat-images"),
        tagCloud: document.getElementById("tag-cloud"),
        grid: document.getElementById("grid"),
        emptyState: document.getElementById("empty-state"),
        content: document.getElementById("content"),
        resultCount: document.getElementById("result-count"),
        saveState: document.getElementById("save-state"),
        statusline: document.getElementById("statusline"),
        toast: document.getElementById("toast"),
        search: document.getElementById("search"),
        sort: document.getElementById("sort"),
        filterButtons: Array.from(document.querySelectorAll("[data-filter]")),
        title: document.getElementById("detail-title"),
        body: document.getElementById("detail-body"),
        tags: document.getElementById("detail-tags"),
        saveNote: document.getElementById("save-note"),
        copySummary: document.getElementById("copy-summary"),
        copyCurrent: document.getElementById("copy-current"),
        saveCurrent: document.getElementById("save-current"),
        newNote: document.getElementById("new-note"),
        dropzone: document.getElementById("editor-dropzone"),
        exportBtn: document.getElementById("export-btn"),
        importBtn: document.getElementById("import-btn"),
        importFile: document.getElementById("import-file"),
        sampleBtn: document.getElementById("new-sample"),
        detailKind: document.getElementById("detail-kind"),
        editorTitle: document.getElementById("editor-title"),
        detailAttachments: document.getElementById("detail-attachments"),
        attachmentCount: document.getElementById("attachment-count"),
        detailMeta: document.getElementById("detail-meta"),
        imageModal: document.getElementById("image-modal"),
        imageModalImg: document.getElementById("image-modal-img"),
        imageModalTitle: document.getElementById("image-modal-title"),
        imageModalCopy: document.getElementById("image-modal-copy"),
        imageModalClose: document.getElementById("image-modal-close"),
        toggleTheme: document.getElementById("toggle-theme"),
        togglePin: document.getElementById("toggle-pin"),
        toggleFavorite: document.getElementById("toggle-favorite"),
        moveUp: document.getElementById("move-up"),
        moveDown: document.getElementById("move-down"),
        deleteNote: document.getElementById("delete-note"),
      };

      const state = {
        notes: [],
        selectedId: null,
        mode: "edit",
        draft: blankDraft(),
        query: "",
        filter: "all",
        sort: "updated-desc",
        theme: "light",
      };

      let db = null;
      let saveTimer = null;
      let toastTimer = null;

      function blankDraft() {
        return { title: "", body: "", tags: [], attachments: [] };
      }

      function createId() {
        return `note_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatTime(value) {
        return new Intl.DateTimeFormat("zh-CN", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function parseTags(value) {
        return String(value)
          .split(/[,\n锛宂/)
          .map((part) => part.trim())
          .filter(Boolean);
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1600);
      }

      function applyTheme() {
        document.body.dataset.theme = state.theme;
        els.toggleTheme.textContent = state.theme === "dark" ? "娴呰壊妯″紡" : "鏆楅粦妯″紡";
      }

      function openImageModal(dataUrl, title) {
        els.imageModalTitle.textContent = title || "鍥剧墖棰勮";
        els.imageModalImg.src = dataUrl;
        els.imageModal.classList.remove("hidden");
        els.imageModal.setAttribute("aria-hidden", "false");
      }

      function closeImageModal() {
        els.imageModal.classList.add("hidden");
        els.imageModal.setAttribute("aria-hidden", "true");
        els.imageModalImg.src = "";
      }

      async function copyImageFromModal() {
        const dataUrl = els.imageModalImg.src;
        if (!dataUrl) {
          showToast("娌℃湁鍙嫹璐濈殑鍥剧墖");
          return;
        }

        try {
          if (navigator.clipboard?.write && typeof ClipboardItem !== "undefined") {
            const blob = await (await fetch(dataUrl)).blob();
            await navigator.clipboard.write([
              new ClipboardItem({
                [blob.type || "image/png"]: blob,
              }),
            ]);
            showToast("鍥剧墖宸叉嫹璐?");
            return;
          }

          await navigator.clipboard.writeText(dataUrl);
          showToast("褰撳墠娴忚鍣ㄤ笉鏀寔鍥剧墖鍓创鏉匡紝宸插鍒跺浘鐗囨暟鎹?");
        } catch (error) {
          console.error(error);
          showToast("鎷疯礉澶辫触");
        }
      }

      function setStatus(message) {
        els.saveState.textContent = message;
      }

      function scheduleSave(message = "淇濆瓨涓?..") {
        setStatus(message);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          await persist();
          setStatus("宸茶嚜鍔ㄤ繚瀛?");
        }, 180);
      }

      function loadUiState() {
        try {
          const raw = localStorage.getItem(UI_KEY);
          if (!raw) return;
          const ui = JSON.parse(raw);
          if (ui.query) state.query = ui.query;
          if (ui.filter) state.filter = ui.filter;
          if (ui.sort) state.sort = ui.sort;
          if (ui.theme) state.theme = ui.theme;
        } catch {
          // ignore invalid ui state
        }
      }

      function saveUiState() {
        localStorage.setItem(
          UI_KEY,
          JSON.stringify({
            query: state.query,
            filter: state.filter,
            sort: state.sort,
            theme: state.theme,
          }),
        );
      }

      function openDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = () => {
            const database = request.result;
            if (!database.objectStoreNames.contains(STORE_NAME)) {
              database.createObjectStore(STORE_NAME, { keyPath: "id" });
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function dbGet(id) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readonly");
          const request = tx.objectStore(STORE_NAME).get(id);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
      }

      function dbPut(value) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const request = tx.objectStore(STORE_NAME).put(value);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      function cloneNotes(notes) {
        return notes.map((note) => ({ ...note, tags: [...note.tags] }));
      }

      async function loadState() {
        db = await openDB();
        const record = await dbGet(STATE_KEY);
        state.notes = record?.notes?.length ? record.notes : [];
        state.selectedId = state.notes[0]?.id || null;
      }

      async function persist() {
        await dbPut({
          id: STATE_KEY,
          notes: cloneNotes(state.notes),
          updatedAt: new Date().toISOString(),
        });
      }

      function currentNote() {
        return state.notes.find((note) => note.id === state.selectedId) || null;
      }

      function currentEditorData() {
        if (state.mode === "new") return state.draft;
        const note = currentNote();
        if (!note) return blankDraft();
        return note;
      }

      function getAttachmentList(note) {
        if (!note) return [];
        if (Array.isArray(note.attachments)) return note.attachments;
        if (note.imageData) {
          return [{ id: createId(), dataUrl: note.imageData, name: "涓诲浘" }];
        }
        return [];
      }

      function setEditorAttachments(attachments) {
        if (state.mode === "new") {
          state.draft.attachments = attachments;
          renderEditor();
          return;
        }

        const note = currentNote();
        if (!note) return;
        updateCurrent({ type: attachments.length ? "image" : "text", attachments });
      }

      function normalizeNote(note, fallbackIndex = 0) {
        const type = note?.type === "image" ? "image" : "text";
        const tags = Array.isArray(note?.tags)
          ? note.tags.map((tag) => String(tag).trim()).filter(Boolean)
          : [];
        const attachments = Array.isArray(note?.attachments) && note.attachments.length
          ? note.attachments
              .filter(Boolean)
              .map((attachment, index) => ({
                id: attachment?.id || createId(),
                dataUrl: String(attachment?.dataUrl || attachment?.imageData || attachment?.url || ""),
                name: String(attachment?.name || `闄勪欢 ${index + 1}`),
              }))
              .filter((attachment) => attachment.dataUrl)
          : String(note?.imageData || note?.imageUrl || "")
              ? [{
                  id: createId(),
                  dataUrl: String(note?.imageData || note?.imageUrl || ""),
                  name: "涓诲浘",
                }]
              : [];

        return {
          id: note?.id || createId(),
          type,
          title: String(note?.title || (type === "image" ? "未命名图片" : "未命名素材")),
          body: String(note?.body || ""),
          attachments,
          tags,
          pinned: Boolean(note?.pinned),
          favorite: Boolean(note?.favorite),
          sortOrder: Number(note?.sortOrder || fallbackIndex + 1),
          createdAt: note?.createdAt || new Date().toISOString(),
          updatedAt: note?.updatedAt || new Date().toISOString(),
        };
      }

      function setEditorToNew() {
        state.mode = "new";
        state.selectedId = null;
        state.draft = blankDraft();
        render();
        els.title.focus();
      }

      function makeNote({ title, body, tags, attachments }) {
        const now = new Date().toISOString();
        const normalizedAttachments = Array.isArray(attachments)
          ? attachments
              .filter(Boolean)
              .map((attachment, index) => ({
                id: attachment?.id || createId(),
                dataUrl: String(attachment?.dataUrl || attachment?.imageData || attachment?.url || ""),
                name: String(attachment?.name || `闄勪欢 ${index + 1}`),
              }))
              .filter((attachment) => attachment.dataUrl)
          : [];
        return {
          id: createId(),
          type: normalizedAttachments.length ? "image" : "text",
          title: title.trim() || (normalizedAttachments.length ? "未命名图片" : "未命名素材"),
          body: body.trim(),
          attachments: normalizedAttachments,
          tags,
          pinned: false,
          favorite: false,
          sortOrder: state.notes.length + 1,
          createdAt: now,
          updatedAt: now,
        };
      }

      function activeNotes() {
        const query = state.query.trim().toLowerCase();
        let notes = [...state.notes];

        if (state.filter !== "all") {
          notes = notes.filter((note) => {
            if (state.filter === "text") return note.type === "text";
            if (state.filter === "image") return note.type === "image";
            if (state.filter === "pinned") return note.pinned;
            if (state.filter === "favorite") return note.favorite;
            return true;
          });
        }

        if (query) {
          notes = notes.filter((note) => {
            const haystack = [note.title, note.body, note.tags.join(" "), note.type].join(" ").toLowerCase();
            return haystack.includes(query);
          });
        }

        if (state.sort === "created-asc") {
          notes.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
        } else if (state.sort === "created-desc") {
          notes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        } else if (state.sort === "manual") {
          notes.sort((a, b) => a.sortOrder - b.sortOrder);
        } else {
          notes.sort((a, b) => {
            const pinnedDiff = Number(b.pinned) - Number(a.pinned);
            if (pinnedDiff !== 0) return pinnedDiff;
            const favoriteDiff = Number(b.favorite) - Number(a.favorite);
            if (favoriteDiff !== 0) return favoriteDiff;
            return new Date(b.updatedAt) - new Date(a.updatedAt);
          });
        }

        return notes;
      }

      function renderStats() {
        els.statTotal.textContent = String(state.notes.length);
        els.statPinned.textContent = String(state.notes.filter((note) => note.pinned).length);
        els.statImages.textContent = String(state.notes.filter((note) => note.type === "image").length);
      }

      function renderTags() {
        const tags = [...new Set(state.notes.flatMap((note) => note.tags))].slice(0, 14);
        els.tagCloud.innerHTML = tags.length
          ? tags
              .map(
                (tag) =>
                  `<button class="chip ${state.query === tag ? "active" : ""}" type="button" data-tag="${escapeHtml(tag)}">#${escapeHtml(tag)}</button>`,
              )
              .join("")
          : `<span class="muted">杩樻病鏈夋爣绛撅紝鍏堢粰绱犳潗琛ヤ竴涓惂銆</span>`;

        els.tagCloud.querySelectorAll("[data-tag]").forEach((button) => {
          button.addEventListener("click", () => {
            const tag = button.getAttribute("data-tag") || "";
            state.query = tag;
            els.search.value = tag;
            saveUiState();
            render();
          });
        });
      }

      function renderFinder() {
        const notes = activeNotes();
        els.resultCount.textContent = `${notes.length} 鏉;
        els.grid.innerHTML = notes
          .map((note) => {
            const selected = state.mode === "edit" && note.id === state.selectedId;
            const badges = [
              note.pinned ? "缃《" : null,
              note.favorite ? "鏀惰棌" : null,
              note.type === "image" ? "鍥剧墖" : "鏂囨湰",
            ]
              .filter(Boolean)
              .map((label) => `<span class="badge-pill">${escapeHtml(label)}</span>`)
              .join("");

            return `
              <article class="card ${selected ? "selected" : ""}" data-id="${note.id}">
                <div class="card-body">
                  <div class="meta-line">
                    <span>${escapeHtml(formatTime(note.updatedAt))}</span>
                    <span>${note.pinned ? "📌" : ""}${note.favorite ? " ★" : ""}</span>
                  </div>
                  <h3 class="card-title">${escapeHtml(note.title)}</h3>
                  <p class="card-text">${escapeHtml(note.body || (note.type === "image" ? "图片素材" : "暂无正文，点击后可继续补充"))}</p>
                  <div class="badges">${badges}</div>
                </div>
              </article>
            `;
          })
          .join("");

        els.emptyState.classList.toggle("hidden", notes.length !== 0);

        els.grid.querySelectorAll("[data-id]").forEach((card) => {
          card.addEventListener("click", () => selectNote(card.getAttribute("data-id")));
        });
      }

      function renderEditor() {
        const note = state.mode === "new" ? state.draft : currentNote();
        const editingNew = state.mode === "new";
        const attachments = getAttachmentList(note);

        els.detailKind.textContent = editingNew ? "鏂板缓鍐呭" : note ? (note.type === "image" ? "鍥剧墖绱犳潗" : "鏂囨湰绱犳潗") : "鏈€夋嫨";
        els.editorTitle.textContent = editingNew ? "鏂板缓鍐呭" : note ? note.title : "涓荤紪杈戝尯";
        els.title.value = note?.title || "";
        els.body.value = note?.body || "";
        els.tags.value = (note?.tags || []).join(", ");
        els.attachmentCount.textContent = `${attachments.length} 寮燻;
        els.detailAttachments.innerHTML = attachments.length
          ? attachments
              .map(
                (attachment, index) => `
                  <figure class="attachment-card" data-open-attachment="${attachment.id}">
                    <img src="${attachment.dataUrl}" alt="${escapeHtml(attachment.name || `闄勪欢 ${index + 1}`)}" />
                    <figcaption>
                      <span>${escapeHtml(attachment.name || `闄勪欢 ${index + 1}`)}</span>
                      <button class="mini-btn" type="button" data-remove-attachment="${attachment.id}">绉婚櫎</button>
                    </figcaption>
                  </figure>
                `,
              )
              .join("")
          : `<div class="muted">褰撳墠娌℃湁鎴浘闄勪欢锛岀矘璐存垨鎷栧叆鍥剧墖鍗冲彲杩藉姞銆</div>`;

        els.detailAttachments.querySelectorAll("[data-remove-attachment]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const attachmentId = button.getAttribute("data-remove-attachment");
            const nextAttachments = attachments.filter((attachment) => attachment.id !== attachmentId);
            setEditorAttachments(nextAttachments);
          });
        });

        els.detailAttachments.querySelectorAll("[data-open-attachment]").forEach((card) => {
          card.addEventListener("click", () => {
            const attachmentId = card.getAttribute("data-open-attachment");
            const attachment = attachments.find((item) => item.id === attachmentId);
            if (!attachment) return;
            openImageModal(attachment.dataUrl, attachment.name || note?.title || "鍥剧墖棰勮");
          });
        });

        els.togglePin.textContent = note?.pinned ? "鍙栨秷缃《" : "缃《";
        els.toggleFavorite.textContent = note?.favorite ? "鍙栨秷鏀惰棌" : "鏀惰棌";
        els.detailMeta.textContent = note
          ? `鍒涘缓浜?${formatTime(note.createdAt || new Date())} 路 鏇存柊浜?${formatTime(note.updatedAt || new Date())}`
          : "点击右侧卡片可切换到编辑模式，或在左侧直接新建一条内容。";
      }

      function renderButtons() {
        els.filterButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.filter === state.filter);
        });
        els.search.value = state.query;
        els.sort.value = state.sort;
        applyTheme();
      }

      function render() {
        renderButtons();
        renderStats();
        renderTags();
        renderFinder();
        renderEditor();
      }

      function selectNote(id) {
        state.mode = "edit";
        state.selectedId = id;
        render();
      }

      function updateCurrent(patch) {
        if (state.mode === "new") {
          Object.assign(state.draft, patch);
          renderEditor();
          return;
        }

        const note = currentNote();
        if (!note) return;
        Object.assign(note, patch, { updatedAt: new Date().toISOString() });
        scheduleSave();
        render();
      }

      function saveCurrent() {
        if (state.mode === "new") {
          const draft = currentEditorData();
          if (!draft.title.trim() && !draft.body.trim() && !getAttachmentList(draft).length) {
            showToast("鍏堝啓鐐瑰唴瀹瑰啀淇濆瓨浼氭洿鏈夌敤");
            return;
          }

          const note = makeNote({
            title: draft.title,
            body: draft.body,
            tags: draft.tags,
            attachments: getAttachmentList(draft),
          });
          state.notes.unshift(note);
          state.selectedId = note.id;
          state.mode = "edit";
          state.draft = blankDraft();
          scheduleSave("姝ｅ湪淇濆瓨...");
          showToast("宸蹭繚瀛樺埌绱犳潗鏉?");
          render();
          return;
        }

        if (!currentNote()) {
          showToast("娌℃湁鍙繚瀛樼殑鍐呭");
          return;
        }

        scheduleSave("姝ｅ湪淇濆瓨...");
        showToast("宸蹭繚瀛?");
      }

      async function copyCurrent() {
        const note = currentEditorData();
        const attachments = getAttachmentList(note);
        const text = [
          note.title,
          note.body,
          note.tags?.length ? `标签：${note.tags.join("，")}` : "",
          attachments.length ? `截图：${attachments.length} 张` : "",
        ]
          .filter(Boolean)
          .join("\n\n");

        try {
          await navigator.clipboard.writeText(text || note.title || note.body || "");
          showToast("宸插鍒?");
        } catch {
          showToast("澶嶅埗澶辫触");
        }
      }

      function togglePin() {
        if (state.mode === "new") {
          showToast("鏂板缓鍐呭淇濆瓨鍚庡啀缃《");
          return;
        }
        const note = currentNote();
        if (!note) return;
        updateCurrent({ pinned: !note.pinned });
      }

      function toggleFavorite() {
        if (state.mode === "new") {
          showToast("鏂板缓鍐呭淇濆瓨鍚庡啀鏀惰棌");
          return;
        }
        const note = currentNote();
        if (!note) return;
        updateCurrent({ favorite: !note.favorite });
      }

      function moveSelected(delta) {
        if (state.mode === "new") {
          showToast("鏂板缓鍐呭淇濆瓨鍚庢墠鑳借皟鏁撮『搴?");
          return;
        }

        const index = state.notes.findIndex((note) => note.id === state.selectedId);
        if (index === -1) return;
        const nextIndex = index + delta;
        if (nextIndex < 0 || nextIndex >= state.notes.length) return;

        const [item] = state.notes.splice(index, 1);
        state.notes.splice(nextIndex, 0, item);
        state.notes.forEach((note, order) => {
          note.sortOrder = order + 1;
          note.updatedAt = new Date().toISOString();
        });
        scheduleSave();
        render();
      }

      function deleteCurrent() {
        if (state.mode === "new") {
          state.draft = blankDraft();
          render();
          showToast("鑽夌宸叉竻绌?");
          return;
        }

        const note = currentNote();
        if (!note) return;
        const ok = confirm(`鍒犻櫎銆?{note.title}銆嶏紵`);
        if (!ok) return;
        state.notes = state.notes.filter((item) => item.id !== note.id);
        state.selectedId = state.notes[0]?.id || null;
        scheduleSave();
        showToast("宸插垹闄?");
        render();
      }

      function toggleTheme() {
        state.theme = state.theme === "dark" ? "light" : "dark";
        saveUiState();
        render();
        showToast(state.theme === "dark" ? "宸插垏鎹负鏆楅粦妯″紡" : "宸插垏鎹负娴呰壊妯″紡");
      }

      async function exportData() {
        const source = state.mode === "new" ? currentEditorData() : currentNote();
        const hasContent =
          source &&
          (String(source.title || "").trim() || String(source.body || "").trim() || getAttachmentList(source).length);

        if (!hasContent) {
          showToast("鍏堥€夋嫨涓€寮犲崱鐗囨垨鍒涘缓涓€鏉¤崏绋垮啀瀵煎嚭");
          return;
        }

        const note = normalizeNote(source);

        try {
          const response = await fetch("/api/export", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ note }),
          });

          const result = await response.json().catch(() => null);
          if (!response.ok || !result || !result.ok) {
            throw new Error((result && result.error) || "瀵煎嚭澶辫触");
          }

          showToast(`宸插鍑哄埌 exports/${result.fileName}`);
        } catch (error) {
          showToast(error.message || "瀵煎嚭澶辫触");
        }
      }

      async function importData(file) {
        const payload = JSON.parse(await file.text());

        if (payload.note) {
          const imported = normalizeNote(payload.note, state.notes.length);
          state.notes.unshift(imported);
          state.selectedId = imported.id;
          state.mode = "edit";
        } else if (Array.isArray(payload.notes)) {
          state.notes = payload.notes.filter(Boolean).map((note, index) => normalizeNote(note, index));
          state.selectedId = state.notes[0]?.id || null;
          state.mode = "edit";
        } else {
          throw new Error("导入文件格式不正确");
        }

        await persist();
        render();
        showToast(payload.note ? "已导入当前卡片" : "已导入素材");
      }

      function seedExample() {
        if (state.notes.length) {
          showToast("褰撳墠宸叉湁绱犳潗锛岀ず渚嬫湭閲嶅鎻掑叆");
          return;
        }

        state.notes = [
          {
            id: createId(),
            type: "text",
            title: "需求摘录",
            body: "把工作里临时出现的内容先放在这里，后面再整理成正式文档。",
            attachments: [],
            tags: ["工作", "需求"],
            pinned: true,
            favorite: false,
            sortOrder: 1,
            createdAt: new Date(Date.now() - 1000 * 60 * 85).toISOString(),
            updatedAt: new Date(Date.now() - 1000 * 60 * 15).toISOString(),
          },
          {
            id: createId(),
            type: "image",
            title: "参考截图",
            body: "可以把截图拖进来，后面再继续标注和搜索。",
            attachments: [
              {
                id: createId(),
                dataUrl:
                  "data:image/svg+xml;charset=utf-8," +
                  encodeURIComponent(
                `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
                  <defs>
                    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                      <stop offset="0%" stop-color="#2d7c73"/>
                      <stop offset="100%" stop-color="#f0b34f"/>
                    </linearGradient>
                  </defs>
                  <rect width="640" height="360" rx="36" fill="#f6efe4"/>
                  <rect x="34" y="34" width="572" height="292" rx="28" fill="url(#g)" opacity="0.92"/>
                  <circle cx="500" cy="100" r="72" fill="rgba(255,255,255,0.18)"/>
                  <rect x="90" y="124" width="238" height="20" rx="10" fill="rgba(255,255,255,0.86)"/>
                  <rect x="90" y="162" width="310" height="14" rx="7" fill="rgba(255,255,255,0.75)"/>
                  <rect x="90" y="188" width="270" height="14" rx="7" fill="rgba(255,255,255,0.65)"/>
                  <text x="90" y="258" fill="white" font-size="26" font-family="Arial, sans-serif">Reference Capture</text>
                </svg>`,
                  ),
                name: "绀轰緥鍥?1",
              },
            ],
            tags: ["截图", "参考"],
            pinned: false,
            favorite: true,
            sortOrder: 2,
            createdAt: new Date(Date.now() - 1000 * 60 * 66).toISOString(),
            updatedAt: new Date(Date.now() - 1000 * 60 * 12).toISOString(),
          },
        ];

        state.selectedId = state.notes[0].id;
        state.mode = "edit";
        persist().then(() => render());
        showToast("宸叉彃鍏ョず渚嬬礌鏉?");
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      async function handleIncomingImage(dataUrl, title = "鎴浘绱犳潗") {
        if (state.mode === "new") {
          state.draft.attachments = [...getAttachmentList(state.draft), { id: createId(), dataUrl, name: title }];
          if (!state.draft.title.trim()) state.draft.title = title;
          renderEditor();
          showToast("宸插姞鍏ヨ崏绋?");
          return;
        }

        const note = currentNote();
        if (!note) {
          state.mode = "new";
          state.draft = { ...blankDraft(), title, attachments: [{ id: createId(), dataUrl, name: title }] };
          render();
          showToast("宸插姞鍏ユ柊鑽夌");
          return;
        }

        const attachments = [...getAttachmentList(note), { id: createId(), dataUrl, name: title }];
        updateCurrent({ type: "image", attachments, title: note.title || title });
      }

      function wireEvents() {
        els.newNote.addEventListener("click", setEditorToNew);
        els.saveCurrent.addEventListener("click", saveCurrent);
        els.saveNote.addEventListener("click", saveCurrent);
        els.copyCurrent.addEventListener("click", copyCurrent);
        els.copySummary.addEventListener("click", copyCurrent);
        els.togglePin.addEventListener("click", togglePin);
        els.toggleFavorite.addEventListener("click", toggleFavorite);
        els.moveUp.addEventListener("click", () => moveSelected(-1));
        els.moveDown.addEventListener("click", () => moveSelected(1));
        els.deleteNote.addEventListener("click", deleteCurrent);
        els.toggleTheme.addEventListener("click", toggleTheme);
        els.imageModalCopy.addEventListener("click", copyImageFromModal);
        els.imageModalClose.addEventListener("click", closeImageModal);
        els.imageModal.addEventListener("click", (event) => {
          if (event.target === els.imageModal) {
            closeImageModal();
          }
        });
        els.exportBtn.addEventListener("click", exportData);
        els.importBtn.addEventListener("click", () => els.importFile.click());
        els.sampleBtn.addEventListener("click", seedExample);

        els.importFile.addEventListener("change", async () => {
          const file = els.importFile.files?.[0];
          if (!file) return;
          try {
            await importData(file);
          } catch (error) {
            console.error(error);
            showToast(error.message || "瀵煎叆澶辫触");
          } finally {
            els.importFile.value = "";
          }
        });

        els.search.addEventListener("input", (event) => {
          state.query = event.target.value;
          saveUiState();
          render();
        });

        els.sort.addEventListener("change", (event) => {
          state.sort = event.target.value;
          saveUiState();
          render();
        });

        els.filterButtons.forEach((button) => {
          button.addEventListener("click", () => {
            state.filter = button.dataset.filter;
            saveUiState();
            render();
          });
        });

        [els.title, els.body, els.tags].forEach((field) => {
          field.addEventListener("input", () => {
            const patch = {
              title: els.title.value,
              body: els.body.value,
              tags: parseTags(els.tags.value),
            };
            updateCurrent(patch);
          });
        });

        els.dropzone.addEventListener("dragover", (event) => {
          event.preventDefault();
          els.dropzone.style.borderColor = "rgba(201, 107, 63, 0.55)";
        });

        els.dropzone.addEventListener("dragleave", () => {
          els.dropzone.style.borderColor = "rgba(45, 124, 115, 0.26)";
        });

        els.dropzone.addEventListener("drop", async (event) => {
          event.preventDefault();
          els.dropzone.style.borderColor = "rgba(45, 124, 115, 0.26)";
          const files = [...event.dataTransfer.files].filter((file) => file.type.startsWith("image/"));
          if (!files.length) {
            showToast("杩欓噷鍙帴鍙楀浘鐗囨枃浠?");
            return;
          }
          for (const file of files) {
            const dataUrl = await readFileAsDataUrl(file);
            await handleIncomingImage(dataUrl, file.name.replace(/\.[^.]+$/, ""));
          }
        });

        document.addEventListener("paste", async (event) => {
          const items = [...(event.clipboardData?.items || [])];
          const imageItem = items.find((item) => item.type.startsWith("image/"));
          if (!imageItem) return;
          const file = imageItem.getAsFile();
          if (!file) return;
          const dataUrl = await readFileAsDataUrl(file);
          await handleIncomingImage(dataUrl, "剪贴板图片");
          event.preventDefault();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            if (!els.imageModal.classList.contains("hidden")) {
              closeImageModal();
              return;
            }
            if (document.activeElement && ["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
              document.activeElement.blur();
            } else if (state.mode === "new") {
              state.draft = blankDraft();
              render();
            }
          }

          if (event.ctrlKey && event.key.toLowerCase() === "k") {
            event.preventDefault();
            els.search.focus();
          }

          if (event.ctrlKey && event.key === "Enter") {
            event.preventDefault();
            saveCurrent();
          }
        });
      }

      async function boot() {
        try {
          loadUiState();
          await loadState();
          if (!state.notes.length) {
            await persist();
          }
          wireEvents();
          render();
          setStatus("宸插氨缁紝鍐呭浼氳嚜鍔ㄤ繚瀛樺湪鏈湴");
        } catch (error) {
          console.error(error);
          setStatus("鍚姩澶辫触锛岃鍒锋柊椤甸潰閲嶈瘯");
          showToast("椤甸潰鍚姩澶辫触");
        }
      }

      boot();
    </script>
  </body>
</html>
